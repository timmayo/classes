<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Materials</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #764ba2;
        }
        .error {
            color: red;
            margin-top: 10px;
            font-size: 14px;
        }
        .loading {
            color: #667eea;
            margin-top: 10px;
        }
        .materials {
            display: none;
            text-align: left;
        }
        .materials h2 {
            margin-top: 0;
            color: #333;
        }
        .material-item {
            margin-bottom: 15px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
        }
        .material-item a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .material-item a:hover {
            text-decoration: underline;
        }
        .logout-btn {
            margin-top: 20px;
            background: #999;
        }
        .logout-btn:hover {
            background: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginForm">
            <h1>Tim's class materials</h1>
            <p>Enter the password provided in class to access materials.</p>
            <input type="password" id="passwordInput" placeholder="Enter password">
            <button onclick="checkPassword()">Access Materials</button>
            <div id="error"></div>
            <div id="loading" class="loading" style="display:none;">Loading materials...</div>
        </div>

        <div id="materials" class="materials">
            <h2 id="className"></h2>
            <div id="materialsList"></div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        // REPLACE THIS WITH YOUR POWER AUTOMATE ENDPOINT URL
        const POWER_AUTOMATE_URL = "https://d5753d79c5f9e75bbb0e8769af2df5.0e.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/9434d58a68734ad184720a6ff6c70af4/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=rwT2YbMa2hHA9-HL7G6R2mYcbv3t5NvaN1pAUWmR1mE";

        async function checkPassword() {
            const password = document.getElementById("passwordInput").value;
            const errorDiv = document.getElementById("error");
            const loadingDiv = document.getElementById("loading");

            if (!password) {
                errorDiv.textContent = "Please enter a password.";
                return;
            }

            loadingDiv.style.display = "block";
            errorDiv.textContent = "";

            try {
                const response = await fetch(POWER_AUTOMATE_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ password: password })
                });

                loadingDiv.style.display = "none";

                if (response.ok) {
                    const data = await response.json();
                    displayMaterials(data);
                } else {
                    errorDiv.textContent = "Invalid password. Try again.";
                }
            } catch (error) {
                loadingDiv.style.display = "none";
                errorDiv.textContent = "Error loading materials. Please try again.";
                console.error("Error:", error);
            }
        }

        function displayMaterials(data) {
            document.getElementById("className").textContent = data.name;
            
            let materialsHTML = "";
            if (data.materials && Array.isArray(data.materials)) {
                data.materials.forEach(material => {
                    const title = material.title ? material.title.replace('.pptx', '') : 'Download';
                    materialsHTML += `
                        <div class="material-item">
                            <strong>${title}</strong><br>
                            <a href="${material.url}" download>Download Slides</a>
                        </div>
                    `;
                });
            }
            document.getElementById("materialsList").innerHTML = materialsHTML;

            document.getElementById("loginForm").style.display = "none";
            document.getElementById("materials").style.display = "block";
        }

        function logout() {
            document.getElementById("loginForm").style.display = "block";
            document.getElementById("materials").style.display = "none";
            document.getElementById("passwordInput").value = "";
            document.getElementById("error").textContent = "";
        }

        document.getElementById("passwordInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") checkPassword();
        });
    </script>

    <footer style="position: fixed; bottom: 10px; right: 10px; font-size: 12px;">
    <a href="https://www.linkedin.com/in/mayotim/" target="_blank" style="color: #667eea; text-decoration: none;">My LinkedIn Profile</a>
</footer>
</body>
</html>
